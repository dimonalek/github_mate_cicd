name: PR Verification  # Статична назва самого workflow в меню ліворуч
run-name: Workflow initiated by ${{ github.actor }}  # Динамічна назва конкретного запуску з іменем користувача

on:
  pull_request:
    types: [opened]

env:
  GITHUB_ACTIONS: "true"

jobs:
  github-task-job:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Display GITHUB_ACTIONS environment variable
        run: |
          echo "Значення змінної GITHUB_ACTIONS: $GITHUB_ACTIONS"

      - name: Show branch and repository name
        run: |
          echo "Репозиторій: ${{ github.repository }}"
          echo "Цільова гілка (Base branch): ${{ github.base_ref }}"
          echo "Гілка з кодом (Head branch): ${{ github.head_ref }}"

      - name: Show event that triggered the workflow
        run: |
          echo "Подія, що запустила workflow: ${{ github.event_name }}"
